# 保存为 .github/workflows/aggregate-nodes.yml
name: Aggregate & Filter V2Ray Nodes

on:
  schedule:
    # 北京时间 9:00 = UTC 01:00
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  aggregate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch & aggregate nodes
        id: fetch
        run: |
          python3 << 'PYEOF'
          import requests, base64, json, re, os
          from urllib.parse import urlparse
          from datetime import datetime, timedelta

          # 获取昨天北京时间日期
          yesterday = (datetime.utcnow() + timedelta(hours=8) - timedelta(days=1)).strftime('%Y%m%d')
          print(f"Target date: {yesterday}")

          # ========== 多源配置（可自行增删） ==========
          sources = {
              'v2rayse_0800': f"https://v2rayse.com/fs/public/{yesterday}/free-node-share-0800.txt",
              'v2rayse_2000': f"https://v2rayse.com/fs/public/{yesterday}/free-node-share-2000.txt",
              'comm_v2ray': f"http://comm.cczzuu.top/node/{yesterday}-v2ray.txt",
              'freeclash': f"https://node.freeclashnode.com/uploads/{yesterday[:4]}/{yesterday[:6]}/{yesterday}.yaml",
              'freeclashnode': f"https://node.freeclashnode.com/uploads/{yesterday[:4]}/{yesterday[:6]}/{yesterday}.txt",
          }

          all_nodes = []
          failed_sources = []

          for name, url in sources.items():
              try:
                  resp = requests.get(url, timeout=30, headers={'User-Agent': 'Mozilla/5.0'})
                  if resp.status_code == 200 and len(resp.text) > 50:
                      content = resp.text.strip()
                      # 尝试 Base64 解码
                      try:
                          decoded = base64.b64decode(content).decode('utf-8', errors='ignore')
                          nodes = [n.strip() for n in decoded.split('\n') 
                                   if n.strip().startswith(('vmess://', 'vless://', 'trojan://', 'ss://', 'ssr://', 'hysteria://', 'hysteria2://'))]
                      except Exception:
                          # 明文格式
                          nodes = [n.strip() for n in content.split('\n') 
                                   if n.strip().startswith(('vmess://', 'vless://', 'trojan://', 'ss://', 'ssr://', 'hysteria://', 'hysteria2://'))]
                      
                      print(f"✓ {name}: {len(nodes)} nodes")
                      all_nodes.extend(nodes)
                  else:
                      failed_sources.append(f"{name}: HTTP {resp.status_code}")
              except Exception as e:
                  failed_sources.append(f"{name}: {str(e)}")

          # ========== 去重：基于服务器地址+端口+协议 ==========
          def node_key(node):
              try:
                  if node.startswith('vmess://'):
                      data = json.loads(base64.b64decode(node[8:].split('#')[0] + '=='))
                      return f"vmess:{data.get('add','')}:{data.get('port','')}"
                  elif node.startswith(('vless://', 'trojan://')):
                      parsed = urlparse(node)
                      return f"{parsed.scheme}:{parsed.hostname}:{parsed.port}"
                  elif node.startswith('ss://'):
                      if '@' in node:
                          match = re.search(r'@([^:]+):(\d+)', node)
                          if match:
                              return f"ss:{match.group(1)}:{match.group(2)}"
                      return f"ss:{hash(node)%100000}"
                  else:
                      return f"other:{hash(node)%100000}"
              except:
                  return f"err:{hash(node)%100000}"

          seen = set()
          unique_nodes = []
          for node in all_nodes:
              key = node_key(node)
              if key not in seen:
                  seen.add(key)
                  unique_nodes.append(node)

          print(f"\nTotal raw: {len(all_nodes)}, Unique: {len(unique_nodes)}")
          if failed_sources:
              print(f"Failed sources: {', '.join(failed_sources)}")

          # 保存去重后的完整节点
          os.makedirs('output', exist_ok=True)
          with open(f'output/{yesterday}-all.txt', 'w', encoding='utf-8') as f:
              f.write('\n'.join(unique_nodes))
          
          # 同时保存为聚合订阅文件 (Base64)
          encoded = base64.b64encode('\n'.join(unique_nodes).encode()).decode()
          with open('output/v2ray.txt', 'w') as f:
              f.write(encoded)
              
          # 设置输出变量
          with open(os.environ.get('GITHUB_OUTPUT', '/dev/null'), 'a') as fh:
              print(f"node_count={len(unique_nodes)}", file=fh)
              print(f"date={yesterday}", file=fh)
          PYEOF

      - name: Test node connectivity (延迟筛选)
        id: test
        run: |
          python3 << 'PYEOF'
          import socket, base64, json, re, os, time, concurrent.futures
          from urllib.parse import urlparse

          yesterday = "${{ steps.fetch.outputs.date }}"
          max_latency = 250  # ms
          max_workers = 50

          # 读取节点
          with open(f'output/{yesterday}-all.txt', 'r') as f:
              nodes = [n.strip() for n in f.readlines() if n.strip()]

          def test_node(node):
              """TCP端口连通性测试"""
              try:
                  if node.startswith('vmess://'):
                      data = json.loads(base64.b64decode(node[8:].split('#')[0] + '=='))
                      host, port = data.get('add'), int(data.get('port', 0))
                  elif node.startswith(('vless://', 'trojan://')):
                      parsed = urlparse(node)
                      host, port = parsed.hostname, parsed.port or 443
                  elif node.startswith('ss://'):
                      if '@' in node:
                          match = re.search(r'@([^:]+):(\d+)', node)
                          if match:
                              host, port = match.group(1), int(match.group(2))
                          else:
                              return None
                      else:
                          return None
                  else:
                      return None

                  if not host or not port:
                      return None

                  sock = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
                  sock.settimeout(3)
                  start = time.time()
                  result = sock.connect_ex((host, port))
                  latency = int((time.time() - start) * 1000)
                  sock.close()

                  if result == 0 and latency <= max_latency:
                      return (node, latency)
                  return None
              except:
                  return None

          # 并发测试
          alive_nodes = []
          with concurrent.futures.ThreadPoolExecutor(max_workers=max_workers) as executor:
              futures = {executor.submit(test_node, n): n for n in nodes}
              for future in concurrent.futures.as_completed(futures):
                  result = future.result()
                  if result:
                      alive_nodes.append(result)

          # 按延迟排序
          alive_nodes.sort(key=lambda x: x[1])
          
          print(f"Alive nodes: {len(alive_nodes)}/{len(nodes)}")
          print(f"Top 10 latencies: {[lat for _, lat in alive_nodes[:10]]}")

          # 保存筛选后的节点
          filtered = [n for n, _ in alive_nodes]
          with open(f'output/{yesterday}-filtered.txt', 'w') as f:
              f.write('\n'.join(filtered))
          
          # 更新主订阅文件（只保留筛选后的）
          encoded = base64.b64encode('\n'.join(filtered).encode()).decode()
          with open('output/v2ray.txt', 'w') as f:
              f.write(encoded)

          # 按协议分类保存
          protocols = {'vmess': [], 'vless': [], 'trojan': [], 'ss': [], 'other': []}
          for node in filtered:
              for p in protocols:
                  if node.startswith(p + '://'):
                      protocols[p].append(node)
                      break
              else:
                  protocols['other'].append(node)

          for proto, items in protocols.items():
              if items:
                  with open(f'output/{yesterday}-{proto}.txt', 'w') as f:
                      f.write('\n'.join(items))
                  # Base64版本
                  with open(f'output/{yesterday}-{proto}.b64.txt', 'w') as f:
                      f.write(base64.b64encode('\n'.join(items).encode()).decode())

          # 输出统计
          with open(os.environ.get('GITHUB_OUTPUT', '/dev/null'), 'a') as fh:
              print(f"alive_count={len(alive_nodes)}", file=fh)
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          DATE="${{ steps.fetch.outputs.date }}"
          git diff --cached --quiet || git commit -m "🔄 Update nodes for ${DATE} | Raw: ${{ steps.fetch.outputs.node_count }} | Alive: ${{ steps.test.outputs.alive_count }}"
          git push

      - name: Summary
        run: |
          echo "## 📊 Node Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Date**: ${{ steps.fetch.outputs.date }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Total Unique**: ${{ steps.fetch.outputs.node_count }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Alive (≤250ms)**: ${{ steps.test.outputs.alive_count }}" >> $GITHUB_STEP_SUMMARY
