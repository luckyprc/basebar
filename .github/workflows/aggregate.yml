name: Node Aggregator CF-Asia
on:
  schedule:
    - cron: '0 1 * * *'   # UTC 01:00 = Beijing 09:00
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyyaml requests maxminddb

      - name: Download GeoLite2 Country DB
        run: |
          wget -qO GeoLite2-Country.mmdb             "https://github.com/P3TERX/GeoLite.mmdb/raw/download/GeoLite2-Country.mmdb"             || wget -qO GeoLite2-Country.mmdb             "https://github.com/alecthw/mmdb_china_ip_list/raw/release/Country.mmdb"
          ls -lh GeoLite2-Country.mmdb

      - name: Run aggregator script
        env:
          CF_PAGES_DOMAIN: ${{ secrets.CF_PAGES_DOMAIN }}
          MAX_LATENCY_MS: "3000"
          LATENCY_TIMEOUT: "3"
        run: |
          mkdir -p output
          python .github/scripts/aggregate.py

      - name: Setup Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Commit outputs to repo (fallback)
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/ || true
          git diff --cached --quiet || git commit -m "update: $(date -u +%Y-%m-%d_%H:%M)"
          git push || true
