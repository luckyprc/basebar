name: Aggregate Proxy Nodes

on:
  schedule:
    # 北京时间每天 10:00 = UTC 02:00
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

# 消除 Node.js 20 运行风险，强制使用 Node 24 执行（warning 会保留但功能正常）
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run aggregator
        run: python update_nodes.py

      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update nodes [$(date +%Y%m%d)]"
          file_pattern: 'output/*.txt'
